<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON LOG">
<title>IRON LOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0F0F14;color:#F2F2F2;font-family:-apple-system,sans-serif;font-size:14px;min-height:100vh;}
input,select,textarea,button{font-family:inherit;font-size:14px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
select option{background:#1E1E2A;}
.nav{position:sticky;top:0;z-index:100;height:50px;background:rgba(15,15,20,.96);border-bottom:1px solid #2E2E3E;display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
.logo{font-size:18px;letter-spacing:3px;color:#C8F020;font-weight:bold;}
.tabs{display:flex;gap:2px;}
.tab{padding:5px 9px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:#666678;}
.tab.active{background:#C8F020;color:#0F0F14;}
.page{display:none;padding-bottom:40px;}
.page.active{display:block;}
.section-hdr{padding:14px 12px 10px;border-bottom:1px solid #2E2E3E;}
.section-hdr h2{font-size:22px;font-weight:bold;}
.section-hdr p{font-size:11px;color:#666678;margin-top:2px;}
.body{padding:12px;}
.fi{background:#1E1E2A;border:1px solid #2E2E3E;color:#F2F2F2;padding:8px 10px;border-radius:4px;width:100%;outline:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:10px;font-weight:700;color:#666678;text-transform:uppercase;}
/* Calendar */
.cal-bg{background:#FAFAFA;padding:12px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-month{font-weight:bold;font-size:18px;color:#1A1A2A;}
.cal-arr{background:#fff;border:1.5px solid #E0E0E8;color:#1A1A2A;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;padding:4px 2px;font-size:10px;font-weight:700;color:#AAAABC;}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;background:#fff;border:1.5px solid #E0E0E8;user-select:none;}
.cal-day.today{border:2px solid #1A1A2A;}
.cal-day.other{opacity:.22;cursor:default;}
.cal-day.trained{border-color:transparent;}
.cal-day-num{font-size:11px;font-weight:600;color:#1A1A2A;}
.cal-day.trained .cal-day-num{color:#fff;}
.cal-day.today .cal-day-num{font-weight:800;}
.cal-emoji{font-size:9px;}
.cal-tip{font-size:10px;color:#AAAABC;text-align:center;padding-top:8px;}
/* Legend */
.legend{padding:6px 12px;background:#16161E;border-bottom:1px solid #2E2E3E;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.leg-lbl{font-size:10px;font-weight:700;color:#666678;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#AAAABC;}
.leg-dot{width:8px;height:8px;border-radius:2px;}
.leg-sep{width:1px;height:10px;background:#2E2E3E;}
/* Hero */
.hero{padding:14px 12px 10px;border-bottom:1px solid #2E2E3E;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.hero h1{font-size:clamp(28px,7vw,48px);line-height:.9;font-weight:bold;}
.hero-stats{display:flex;gap:7px;flex-shrink:0;}
.hstat{background:#16161E;border:1px solid #2E2E3E;border-radius:5px;padding:7px 10px;text-align:center;min-width:46px;}
.hstat-v{font-size:22px;color:#C8F020;font-weight:bold;line-height:1;}
.hstat-l{font-size:9px;color:#666678;margin-top:2px;}
/* Status buttons */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.status-btn{padding:8px 4px;border-radius:4px;border:1px solid #2E2E3E;cursor:pointer;font-size:11px;font-weight:700;background:#1E1E2A;color:#666678;display:flex;flex-direction:column;align-items:center;gap:3px;}
.status-btn .emoji{font-size:18px;}
/* Exercise block */
.ex-block{background:#16161E;border:1px solid #2E2E3E;border-radius:6px;margin-bottom:10px;overflow:hidden;}
.ex-hdr{padding:8px 10px;background:#252532;border-bottom:1px solid #2E2E3E;display:flex;align-items:center;gap:8px;}
.ex-num{font-size:18px;color:#C8F020;font-weight:bold;width:20px;flex-shrink:0;}
.ex-sel{flex:1;}
.ex-del{background:transparent;border:1px solid #2E2E3E;color:#666678;width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:12px;flex-shrink:0;}
/* Muscle figure */
.ex-muscle{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;background:#0A0A12;border-bottom:1px solid #2E2E3E;}
.muscle-svg{width:70px;height:122px;flex-shrink:0;}
.muscle-info{flex:1;min-width:0;}
.muscle-name{font-size:13px;font-weight:800;margin-bottom:4px;}
.muscle-primary-lbl{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.muscle-primary{font-size:12px;color:#AAAABC;margin-bottom:3px;}
.muscle-secondary{font-size:11px;color:#555568;margin-bottom:4px;}
.muscle-tip{font-size:11px;color:#666678;line-height:1.5;border-left:2px solid;padding-left:6px;}
/* Sets */
.sets-hdr{display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid #2E2E3E;font-size:10px;font-weight:700;color:#666678;text-transform:uppercase;}
.set-row{display:flex;gap:6px;align-items:center;padding:6px 10px;border-bottom:1px solid rgba(46,46,62,.5);}
.set-num{font-size:16px;color:#666678;font-weight:bold;width:22px;flex-shrink:0;}
.set-inp{background:#252532;border:1px solid #2E2E3E;color:#F2F2F2;padding:5px;border-radius:4px;font-size:16px;font-weight:bold;text-align:center;outline:none;}
.set-done{border:1px solid #2E2E3E;background:transparent;cursor:pointer;font-size:11px;color:transparent;border-radius:4px;width:24px;height:24px;flex-shrink:0;}
.set-done.done{background:#44CC88;border-color:#44CC88;color:#0F0F14;}
.set-del-btn{background:transparent;border:none;color:#666678;cursor:pointer;font-size:12px;}
.ex-footer{padding:6px 10px;border-top:1px solid #2E2E3E;}
.btn-add-set{padding:5px 10px;border-radius:4px;border:1px dashed #3A3A50;background:transparent;color:#AAAABC;font-size:11px;font-weight:600;cursor:pointer;}
.btn-add-ex{width:100%;padding:10px;margin-bottom:10px;background:transparent;color:#C8F020;border:1px dashed rgba(200,240,32,.35);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;}
.notes-ta{background:#1E1E2A;border:1px solid #2E2E3E;color:#F2F2F2;padding:10px;border-radius:4px;resize:vertical;min-height:60px;width:100%;margin-bottom:12px;outline:none;}
.action-row{display:flex;gap:9px;margin-bottom:36px;}
.btn-ghost{padding:11px 14px;background:transparent;border:1px solid #2E2E3E;border-radius:4px;cursor:pointer;color:#666678;font-weight:600;}
.btn-primary{flex:1;padding:11px;background:#C8F020;color:#0F0F14;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:800;}
/* Charts */
.chart-card{background:#16161E;border:1px solid #2E2E3E;border-radius:6px;padding:12px;margin-bottom:10px;}
.chart-card h3{font-size:16px;font-weight:bold;margin-bottom:8px;}
.chart-dates{display:flex;justify-content:space-between;font-size:9px;color:#666678;margin-top:3px;}
/* History */
.hist-entry{background:#16161E;border:1px solid #2E2E3E;border-radius:6px;margin-bottom:9px;overflow:hidden;cursor:pointer;}
.hist-hdr{padding:9px 12px;background:#252532;border-bottom:1px solid #2E2E3E;display:flex;align-items:center;justify-content:space-between;}
.hist-date{font-size:15px;font-weight:bold;}
.hist-part{font-size:11px;color:#666678;margin-top:1px;}
.hist-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.hist-body{padding:8px 12px;}
.hist-ex-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(46,46,62,.35);font-size:12px;}
.hist-ex-name{font-weight:600;}
.hist-ex-info{color:#666678;}
/* Toast */
.toast{display:none;position:fixed;bottom:18px;left:12px;right:12px;background:#C8F020;color:#0F0F14;padding:11px 14px;border-radius:6px;font-weight:800;font-size:14px;text-align:center;z-index:300;}
.toast.show{display:block;}
/* Ib form */
.ib-form{background:#16161E;border:1px solid #2E2E3E;border-radius:6px;padding:12px;margin-bottom:14px;}
.ib-form h3{font-size:18px;font-weight:bold;margin-bottom:9px;}
.btn-save-ib{width:100%;padding:10px;background:#C8F020;color:#0F0F14;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:800;}
.empty{text-align:center;padding:40px 20px;color:#666678;}
.empty-icon{font-size:38px;margin-bottom:10px;opacity:.4;}
</style>
</head>
<body>

<div class="nav">
  <div class="logo">IRON LOG</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('cal')">カレンダー</button>
    <button class="tab" onclick="showTab('log')">記録</button>
    <button class="tab" onclick="showTab('ib')">Inbody</button>
    <button class="tab" onclick="showTab('hist')">履歴</button>
  </div>
</div>

<!-- CALENDAR -->
<div id="page-cal" class="page active">
  <div class="hero">
    <div><h1>TRAIN<br/><span style="color:#C8F020">EVERY<br/>DAY.</span></h1></div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-v" id="stat-d">0</div><div class="hstat-l">日間</div></div>
      <div class="hstat"><div class="hstat-v" id="stat-s">0</div><div class="hstat-l">セット</div></div>
    </div>
  </div>
  <div class="legend" id="legend-bar"></div>
  <div class="cal-bg">
    <div class="cal-nav">
      <button class="cal-arr" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month"></div>
      <button class="cal-arr" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-tip">← 日付をタップ → 記録ページへ</div>
  </div>
</div>

<!-- LOG -->
<div id="page-log" class="page">
  <div class="section-hdr">
    <h2>トレーニング記録</h2>
    <p id="log-date-label"></p>
  </div>
  <div class="body">
    <div class="grid2">
      <div class="fg"><label class="flbl">日付</label><input type="date" class="fi" id="log-date" onchange="onLogDate()"/></div>
      <div class="fg"><label class="flbl">部位</label>
        <select class="fi" id="log-part" onchange="onPartChange()">
          <option value="chest">胸</option><option value="back">背中</option>
          <option value="legs">脚</option><option value="shoulders">肩</option>
          <option value="arms">腕</option><option value="abs">腹筋</option>
          <option value="full">全身</option><option value="cardio">有酸素</option>
        </select>
      </div>
    </div>
    <div class="fg" style="margin-bottom:10px">
      <label class="flbl" style="margin-bottom:5px;display:block">達成感</label>
      <div class="status-grid" id="status-grid"></div>
    </div>
    <div id="ex-container"></div>
    <button class="btn-add-ex" onclick="addExercise()">＋ 種目を追加</button>
    <div class="fg" style="margin-bottom:14px"><label class="flbl">メモ</label><textarea class="notes-ta" id="log-notes" placeholder="体調・フォームメモ・次回の目標など..."></textarea></div>
    <div class="action-row">
      <button class="btn-ghost" onclick="clearLog()">クリア</button>
      <button class="btn-primary" onclick="saveWorkout()">保存する</button>
    </div>
  </div>
</div>

<!-- INBODY -->
<div id="page-ib" class="page">
  <div class="section-hdr"><h2>INBODY 計測</h2><p>体の変化を時系列で確認しましょう</p></div>
  <div class="body">
    <div class="ib-form">
      <h3>新しい計測を追加</h3>
      <div class="grid2">
        <div class="fg"><label class="flbl">日付</label><input type="date" class="fi" id="ib-date"/></div>
        <div class="fg"><label class="flbl">体重(kg)</label><input type="number" step="0.1" class="fi" id="ib-weight" placeholder="55.0"/></div>
      </div>
      <div class="grid3">
        <div class="fg"><label class="flbl">筋肉量(kg)</label><input type="number" step="0.1" class="fi" id="ib-muscle" placeholder="24.0"/></div>
        <div class="fg"><label class="flbl">体脂肪量(kg)</label><input type="number" step="0.1" class="fi" id="ib-fat" placeholder="12.0"/></div>
        <div class="fg"><label class="flbl">体脂肪率(%)</label><input type="number" step="0.1" class="fi" id="ib-fatpct" placeholder="21.0"/></div>
      </div>
      <div class="grid3">
        <div class="fg"><label class="flbl">BMI</label><input type="number" step="0.1" class="fi" id="ib-bmi" placeholder="21.5"/></div>
        <div class="fg"><label class="flbl">基礎代謝</label><input type="number" class="fi" id="ib-bmr" placeholder="1200"/></div>
        <div class="fg"><label class="flbl">内臓脂肪</label><input type="number" step="0.5" class="fi" id="ib-vis" placeholder="4.0"/></div>
      </div>
      <button class="btn-save-ib" onclick="saveInbody()">計測結果を保存</button>
    </div>
    <div id="ib-charts"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="page-hist" class="page">
  <div class="section-hdr"><h2>トレーニング履歴</h2></div>
  <div class="body" id="hist-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
var PC={chest:"#FF8FA3",back:"#80BCFF",legs:"#6EE6A0",shoulders:"#FFD080",arms:"#C49EFF",abs:"#FF9E6E",full:"#80E8E8",cardio:"#FFB3D9"};
var PN={chest:"胸",back:"背中",legs:"脚",shoulders:"肩",arms:"腕",abs:"腹筋",full:"全身",cardio:"有酸素"};

function showTab(id){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.getElementById("page-"+id).classList.add("active");
  var tabs=document.querySelectorAll(".tab");
  var idx={cal:0,log:1,ib:2,hist:3}[id];
  if(tabs[idx])tabs[idx].classList.add("active");
  if(id==="hist")renderHistory();
  if(id==="ib")renderCharts();
}

function changeMonth(dir){curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+dir,1);renderCalendar();}
function renderCalendar(){
  var yr=curMonth.getFullYear(),mo=curMonth.getMonth();
  document.getElementById("cal-month").textContent=curMonth.toLocaleDateString("ja-JP",{year:"numeric",month:"long"});
  var fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),pd=new Date(yr,mo,0).getDate();

  ["日","月","火","水","木","金","土"].forEach(function(d){html+='<div class="cal-head">'+d+'</div>';});
  for(var i=0;i<fd;i++)html+='<div class="cal-day other"><span class="cal-day-num">'+(pd-fd+1+i)+'</span></div>';
  for(var d=1;d<=dim;d++){
    var ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var w=workouts[ds];
    var trained=!!(w&&w.exercises&&w.exercises.length);
    var col=trained?(PC[w.part]||"#C8F020"):"";
    var emoji=w&&w.status&&ST[w.status]?ST[w.status].e:"";
    var cls="cal-day"+(ds===today?" today":"")+(trained?" trained":"");
    var style=col?'style="background:'+col+'"':'';
    html+='<div class="'+cls+'" '+style+' onclick="goLog(''+ds+'')">'
      +'<span class="cal-day-num">'+d+'</span>'
      +(emoji?'<span class="cal-emoji">'+emoji+'</span>':'')
      +'</div>';
  }
  var rem=((fd+dim)%7===0)?0:7-((fd+dim)%7);
  for(var j=1;j<=rem;j++)html+='<div class="cal-day other"><span class="cal-day-num">'+j+'</span></div>';
  document.getElementById("cal-grid").innerHTML=html;
  updateStats();
}
function updateStats(){
  var yr=curMonth.getFullYear(),mo=curMonth.getMonth(),sd=0,ss=0;
  Object.keys(workouts).forEach(function(ds){
    var w=workouts[ds],d=new Date(ds+"T00:00:00");
    if(d.getFullYear()===yr&&d.getMonth()===mo&&w.exercises&&w.exercises.length){sd++;w.exercises.forEach(function(e){ss+=e.sets.length;});}
  });
  document.getElementById("stat-d").textContent=sd;
  document.getElementById("stat-s").textContent=ss;
}

// ── LOG ───────────────────────────────────────────────────────────────────
function goLog(ds){
  var w=workouts[ds];
  document.getElementById("log-date").value=ds;
  onLogDate();
  if(w){
    document.getElementById("log-part").value=w.part||"chest";
    document.getElementById("log-notes").value=w.notes||"";
    logStatus=w.status||null;
  }else{
    document.getElementById("log-part").value="chest";
    document.getElementById("log-notes").value="";
    logStatus=null;
  }
  renderStatusBtns();
  exCtr=0;
  document.getElementById("ex-container").innerHTML="";
  if(w&&w.exercises&&w.exercises.length){
    w.exercises.forEach(function(ex){addExercise(ex);});
  }else{
    addExercise(null);
  }
  showTab("log");
}
function onLogDate(){
  var ds=document.getElementById("log-date").value;
  if(!ds)return;
  var d=new Date(ds+"T00:00:00");
  document.getElementById("log-date-label").textContent=d.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
}
function onPartChange(){
  var part=document.getElementById("log-part").value;
  var list=DB[part]||[];
  document.querySelectorAll(".ex-sel select").forEach(function(sel){
    var cur=sel.value;
    var found=list.find(function(x){return x.n===cur;});
    var opts=list.map(function(x){return '<option value="'+x.n+'">'+x.n+'</option>';}).join("")+'<option value="__custom__">＋ カスタム種目</option>';
    sel.innerHTML=opts;
    if(!found)sel.value=list[0]?list[0].n:"";
    updateMuscle(sel.closest(".ex-block"));
  });
}
function renderStatusBtns(){
  var html="";
  Object.keys(ST).forEach(function(k){
    var v=ST[k];
    var sel=logStatus===k;
    var style=sel?"border-color:"+v.c+";background:"+v.c+"18;color:"+v.c:"";
    html+='<button class="status-btn" data-k="'+k+'" onclick="selStatus(''+k+'')" style="'+style+'">'
      +'<span class="emoji">'+v.e+'</span><span>'+v.l+'</span></button>';
  });
  document.getElementById("status-grid").innerHTML=html;
}
function selStatus(k){
  logStatus=logStatus===k?null:k;
  renderStatusBtns();
}
function addExercise(data){
  exCtr++;
  var id=exCtr;
  var part=document.getElementById("log-part").value;
  var list=DB[part]||[];
  var isCustom=data&&!list.find(function(x){return x.n===data.n||x.n===data.name;});
  var exName=data?(data.n||data.name):"";
  if(!exName&&list[0])exName=list[0].n;
  var opts=list.map(function(x){return '<option value="'+x.n+'"'+(x.n===exName?' selected':'')+'>'+x.n+'</option>';}).join("")+'<option value="__custom__"'+(isCustom?' selected':'')+'>＋ カスタム種目</option>';
  var setsHtml=(data&&data.sets&&data.sets.length)?data.sets.map(function(s,i){return makeSetRow(id,i+1,s);}).join(""):makeSetRow(id,1,null)+makeSetRow(id,2,null)+makeSetRow(id,3,null);
  var div=document.createElement("div");
  div.className="ex-block";
  div.id="ex-"+id;
  div.innerHTML='<div class="ex-hdr">'
    +'<div class="ex-num">'+id+'</div>'
    +'<div class="ex-sel" style="flex:1;display:flex;gap:5px;align-items:center">'
    +(isCustom
      ?'<input class="fi" style="padding:5px 8px;font-size:13px;font-weight:600" value="'+exName+'" placeholder="種目名を入力" oninput="updateMuscle(this.closest('.ex-block'))">'
      :'<select class="fi" style="padding:5px 8px;font-size:13px;font-weight:600" onchange="onExSelect(this)">'+(opts)+'</select>'
    )+'</div>'
    +'<button class="ex-del" onclick="document.getElementById('ex-'+id+'').remove()">✕</button>'
    +'</div>'
    +'<div class="ex-muscle-wrap"></div>'
    +'<div class="sets-hdr"><span style="width:22px">SET</span><span style="width:62px;text-align:center">kg</span><span style="width:62px;text-align:center">reps</span><span style="width:48px;text-align:center">RPE</span></div>'
    +'<div class="sets-body">'+setsHtml+'</div>'
    +'<div class="ex-footer"><button class="btn-add-set" onclick="addSetToBlock('+id+')">＋ セット追加</button></div>';
  document.getElementById("ex-container").appendChild(div);
  updateMuscle(div);
}
function makeSetRow(exId,num,data){
  var w=data?data.w:"",r=data?data.r:"",rpe=data?data.rpe:"",done=data&&data.done;
  return '<div class="set-row">'
    +'<span class="set-num">'+num+'</span>'
    +'<input type="number" step="0.5" class="set-inp" style="width:62px" value="'+w+'" placeholder="kg">'
    +'<input type="number" step="1" class="set-inp" style="width:62px" value="'+r+'" placeholder="reps">'
    +'<input type="number" step="0.5" class="set-inp" style="width:48px" value="'+rpe+'" placeholder="—">'
    +'<button class="set-done'+(done?' done':'')+'" onclick="this.classList.toggle('done')">✓</button>'
    +'<button class="set-del-btn" onclick="this.closest('.set-row').remove();renum('+exId+')">✕</button>'
    +'</div>';
}
function renum(exId){
  var block=document.getElementById("ex-"+exId);
  if(!block)return;
  block.querySelectorAll(".set-num").forEach(function(el,i){el.textContent=i+1;});
}
function addSetToBlock(exId){
  var block=document.getElementById("ex-"+exId);
  var body=block.querySelector(".sets-body");
  var num=body.querySelectorAll(".set-row").length+1;
  var tmp=document.createElement("div");
  tmp.innerHTML=makeSetRow(exId,num,null);
  body.appendChild(tmp.firstChild);
}
function onExSelect(sel){
  if(sel.value==="__custom__"){
    var inp=document.createElement("input");
    inp.className="fi";inp.style.cssText="padding:5px 8px;font-size:13px;font-weight:600;flex:1";
    inp.placeholder="種目名を入力";
    inp.oninput=function(){updateMuscle(inp.closest(".ex-block"));};
    sel.parentNode.replaceChild(inp,sel);
  }
  updateMuscle(sel.closest(".ex-block"));
}
function updateMuscle(block){
  if(!block)return;
  var nameEl=block.querySelector("select")||block.querySelector("input.fi");
  var name=nameEl?nameEl.value:"";
  var part=document.getElementById("log-part").value;
  var col=PC[part]||"#C8F020";
  var list=DB[part]||[];
  var info=list.find(function(x){return x.n===name;});
  var wrap=block.querySelector(".ex-muscle-wrap");
  if(!info){wrap.innerHTML="";return;}
  wrap.innerHTML='<div class="ex-muscle">'
    +'<div class="muscle-svg">'+getMuscSVG(name,col)+'</div>'
    +'<div class="muscle-info">'
    +'<div class="muscle-name">'+name+'</div>'
    +'<div class="muscle-primary-lbl" style="color:'+col+'">主働筋</div>'
    +'<div class="muscle-primary">'+info.p+'</div>'
    +(info.s!=="—"?'<div class="muscle-secondary">補助筋: '+info.s+'</div>':'')
    +'<div class="muscle-tip" style="border-color:'+col+'">'+info.t+'</div>'
    +'</div></div>';
}
function collectLog(){
  var exs=[];
  document.querySelectorAll(".ex-block").forEach(function(block){
    var nameEl=block.querySelector("select")||block.querySelector("input.fi");
    var name=nameEl?nameEl.value.trim():"";
    if(name==="__custom__"||!name)return;
    var sets=[];
    block.querySelectorAll(".set-row").forEach(function(row){
      var inps=row.querySelectorAll("input");
      sets.push({w:inps[0]?inps[0].value:"",r:inps[1]?inps[1].value:"",rpe:inps[2]?inps[2].value:"",done:!!(row.querySelector(".set-done.done"))});
    });
    exs.push({n:name,name:name,p:"",s:"",t:"",sets:sets});
  });
  return exs;
}
function saveWorkout(){
  var ds=document.getElementById("log-date").value;
  if(!ds){showToast("日付を選択してください");return;}
  workouts[ds]={date:ds,part:document.getElementById("log-part").value,status:logStatus,notes:document.getElementById("log-notes").value,exercises:collectLog(),savedAt:new Date().toISOString()};
  save("il-v9-w",workouts);
  renderCalendar();
  showToast("✓ 保存しました");
}
function clearLog(){
  if(!confirm("この記録をクリアしますか？"))return;
  document.getElementById("ex-container").innerHTML="";
  exCtr=0;logStatus=null;
  document.getElementById("log-notes").value="";
  renderStatusBtns();
  addExercise(null);
}

// ── INBODY ────────────────────────────────────────────────────────────────
function saveInbody(){
  var ds=document.getElementById("ib-date").value;
  if(!ds){showToast("日付を入力してください");return;}
  var e={date:ds};
  ["weight","muscle","fat","fatpct","bmi","bmr","vis"].forEach(function(k){
    e[k]=parseFloat(document.getElementById("ib-"+k).value)||null;
  });
  inbodyData=inbodyData.filter(function(x){return x.date!==ds;});
  inbodyData.push(e);
  inbodyData.sort(function(a,b){return a.date.localeCompare(b.date);});
  save("il-v9-ib",inbodyData);
  ["weight","muscle","fat","fatpct","bmi","bmr","vis"].forEach(function(k){document.getElementById("ib-"+k).value="";});
  renderCharts();
  showToast("✓ 計測結果を保存しました");
}
function renderCharts(){
  var el=document.getElementById("ib-charts");
  if(!inbodyData.length){el.innerHTML='<div style="text-align:center;padding:30px;color:#666678">計測結果を入力するとグラフが表示されます</div>';return;}
  var html="";
  [{title:"体重の推移",key:"weight",col:"#C8F020"},{title:"筋肉量",key:"muscle",col:"#6EE6A0"},{title:"体脂肪率(%)",key:"fatpct",col:"#80BCFF"}].forEach(function(item){
    var pts=inbodyData.filter(function(e){return e[item.key]!=null;});
    if(!pts.length)return;
    var vals=pts.map(function(e){return e[item.key];});
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
    var W=270,H=70,pad=8;
    var mp=pts.map(function(e,i,arr){return{x:pad+(i/Math.max(arr.length-1,1))*(W-pad*2),y:H-pad-((e[item.key]-mn)/rng)*(H-pad*2),v:e[item.key]};});
    var pd=mp.map(function(p,i){return(i===0?"M":"L")+" "+p.x+" "+p.y;}).join(" ");
    var last=mp[mp.length-1];
    var dots=mp.map(function(p,i){var txt=(i===0||i===mp.length-1)?'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="'+item.col+'">'+p.v+'</text>':"";return'<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+item.col+'"/>'+txt;}).join("");
    html+='<div class="chart-card"><h3>'+item.title+'</h3>'
      +'<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">'
      +'<path d="'+pd+'" stroke="'+item.col+'" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
      +'<path d="'+pd+' L '+last.x+' '+H+' L '+mp[0].x+' '+H+' Z" fill="'+item.col+'" opacity=".1"/>'
      +dots+'</svg>'
      +'<div class="chart-dates"><span>'+pts[0].date+'</span><span>'+pts[pts.length-1].date+'</span></div>'
      +'</div>';
  });
  el.innerHTML=html;
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory(){
  var el=document.getElementById("hist-body");
  var keys=Object.keys(workouts).sort(function(a,b){return b.localeCompare(a);}).filter(function(ds){var w=workouts[ds];return w&&w.exercises&&w.exercises.length;});
  if(!keys.length){el.innerHTML='<div class="empty"><div class="empty-icon">🏋️</div><div>まだ記録がありません。<br/>カレンダーの日付をタップして記録しましょう。</div></div>';return;}
  var html="";
  keys.forEach(function(ds){
    var w=workouts[ds];
    var d=new Date(ds+"T00:00:00");
    var lbl=d.toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
    var col=PC[w.part]||"#C8F020";
    var stt=w.status&&ST[w.status]?ST[w.status].e:"";
    var rows=w.exercises.map(function(ex){
      var maxW=Math.max.apply(null,(ex.sets||[]).map(function(s){return parseFloat(s.w)||0;}));
      return'<div class="hist-ex-row"><span class="hist-ex-name">'+(ex.n||ex.name)+'</span><span class="hist-ex-info">'+(ex.sets?ex.sets.length:0)+'セット · 最大'+maxW+'kg</span></div>';
    }).join("");
    html+='<div class="hist-entry" onclick="goLog(''+ds+'')">'
      +'<div class="hist-hdr">'
      +'<div><div class="hist-date">'+stt+' '+lbl+'</div>'+(w.part?'<div class="hist-part">'+PN[w.part]+'</div>':'')+'</div>'
      +'<span class="hist-badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44">'+w.exercises.length+'種目</span>'
      +'</div>'
      +'<div class="hist-body">'+rows+'</div>'
      +'</div>';
  });
  el.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderLegend();
renderCalendar();
renderStatusBtns();
document.getElementById("log-date").value=toDS(new Date());
document.getElementById("ib-date").value=toDS(new Date());
onLogDate();
addExercise(null);
</script>
</body>
